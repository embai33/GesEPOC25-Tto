<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Lungs icon stylized -->
  <g transform="translate(256,240)" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Trachea -->
    <line x1="0" y1="-100" x2="0" y2="-30"/>
    <!-- Left bronchus -->
    <path d="M0,-30 Q-30,-30 -50,-10"/>
    <!-- Right bronchus -->
    <path d="M0,-30 Q30,-30 50,-10"/>
    <!-- Left lung -->
    <path d="M-50,-10 Q-110,-10 -110,60 Q-110,130 -50,130 Q-20,130 -10,100" fill="rgba(255,255,255,0.15)"/>
    <!-- Right lung -->
    <path d="M50,-10 Q110,-10 110,60 Q110,130 50,130 Q20,130 10,100" fill="rgba(255,255,255,0.15)"/>
  </g>
  <!-- Text -->
  <text x="256" y="410" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="52" font-weight="700" letter-spacing="2">GesEPOC</text>
  <text x="256" y="455" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="400">2025</text>
</svg>
